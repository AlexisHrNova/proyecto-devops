<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto DevOps</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      max-width: 600px;
      width: 90%;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    p {
      font-size: 1.3rem;
      color: #e2e8f0;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 10px 20px;
      background: #22c55e;
      color: white;
      border-radius: 30px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.4);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 Proyecto DevOps Version 2</h1>

    <p>
      Docker + Jenkins + Kubernetes
    </p>

    <div class="badge">
      ✅ Deployment Exitoso
	Actualizado desde Jenkins CI/CD
    </div>
  </div>
</body>
</html>
